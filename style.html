<style>

:root{

--primary:#003399;
--secondary:#005eff;
--accent:#ffd54f;
--white:#ffffff;
--dark:#1f2937;

}

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;

}

html{

scroll-behavior:smooth;

}

body{

background:#f4f8ff;
overflow-x:hidden;

}

/* NAVBAR */

.navbar{

position:fixed;
top:0;
left:0;
width:100%;
z-index:999;

background:rgba(0,51,153,.85);

backdrop-filter:blur(12px);

box-shadow:0 5px 20px rgba(0,0,0,.15);

}

.nav-container{

max-width:1400px;
margin:auto;

display:flex;
justify-content:space-between;
align-items:center;

padding:15px 30px;

}

.logo-area{

display:flex;
align-items:center;
gap:15px;

}

.logo{

width:55px;

}

.logo-title{

font-size:22px;
font-weight:700;
color:white;

}

.logo-sub{

font-size:12px;
color:#ddd;

}

.nav-menu{

display:flex;
gap:30px;
list-style:none;

}

.nav-menu a{

text-decoration:none;
color:white;
font-weight:500;

}

.nav-menu a:hover{

color:var(--accent);

}

.admin-btn{

background:var(--accent);
color:#003399;

padding:10px 18px;
border-radius:30px;

font-weight:600;
text-decoration:none;

}

/* HERO */

.hero{

height:100vh;

background:
linear-gradient(
rgba(0,51,153,.85),
rgba(0,94,255,.75)
),
url("https://i.imgur.com/6JamZoo.jpeg");

background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:center;

position:relative;

}

.hero-content{

text-align:center;
color:white;
position:relative;
z-index:2;

max-width:900px;
padding:20px;

}

.hero-logo{

width:140px;
margin-bottom:20px;

}

.hero h1{

font-size:72px;
font-weight:800;
margin-bottom:15px;

}

.hero-text{

font-size:26px;
margin-bottom:15px;

}

.hero-campus{

font-size:18px;
opacity:.9;

}

.hero-buttons{

margin-top:40px;

display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;

}

.btn-primary-custom,
.btn-secondary-custom{

padding:15px 30px;
border-radius:50px;

text-decoration:none;
font-weight:600;

}

.btn-primary-custom{

background:var(--accent);
color:#003399;

}

.btn-secondary-custom{

background:white;
color:#003399;

}

/* MARQUEE */

.marquee-container{

background:#003399;
color:white;

overflow:hidden;

padding:12px;

}

.marquee{

white-space:nowrap;
display:inline-block;

animation:marquee 25s linear infinite;

}

@keyframes marquee{

0%{
transform:translateX(100%);
}

100%{
transform:translateX(-100%);
}

}

/* SECTION */

.section{

padding:90px 20px;

max-width:1300px;
margin:auto;

}

.section-title{

text-align:center;
margin-bottom:50px;

}

.section-title h2{

font-size:42px;
color:#003399;

}

/* SERVICES */

.service-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(300px,1fr));

gap:30px;

}

.service-card{

background:white;

padding:35px;

border-radius:25px;

box-shadow:
0 10px 30px rgba(0,0,0,.08);

transition:.3s;

text-align:center;

}

.service-card:hover{

transform:translateY(-10px);

}

.icon-box{

width:90px;
height:90px;

margin:auto;

background:
linear-gradient(
135deg,
#003399,
#005eff
);

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

font-size:40px;
color:white;

margin-bottom:20px;

}

.service-card a{

display:inline-block;
margin-top:15px;

background:#003399;
color:white;

padding:12px 25px;
border-radius:30px;

text-decoration:none;

}

/* STATS */

.stats-section{

background:
linear-gradient(
135deg,
#003399,
#005eff
);

padding:80px 20px;

}

.stats-container{

max-width:1200px;
margin:auto;

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:25px;

}

.stat-box{

background:rgba(255,255,255,.12);

backdrop-filter:blur(12px);

padding:30px;

border-radius:20px;

text-align:center;
color:white;

}

.stat-box h3{

font-size:50px;

}

/* PLACEHOLDER */

.placeholder-box{

background:white;

padding:60px;

border-radius:20px;

box-shadow:
0 10px 30px rgba(0,0,0,.08);

text-align:center;

}

/* FOOTER */

footer{

background:#001d5e;

color:white;

text-align:center;

padding:50px 20px;

}

/* MOBILE */

@media(max-width:768px){

.hero h1{
font-size:42px;
}

.hero-text{
font-size:18px;
}

.nav-menu{
display:none;
}

.hero-logo{
width:100px;
}

}

.berita-card img,
.berita-img{

width:100%;
height:220px;
object-fit:cover;
border-radius:15px;
margin-bottom:15px;

}

/* AREA ADMIN */
.admin-area{
    display:flex;
    align-items:center;
    gap:12px;
}


/* BUTTON ADMIN */
.admin-btn{

    display:flex;
    align-items:center;
    gap:8px;

    background:linear-gradient(135deg,#005eff,#003399);

    color:white;

    padding:10px 16px;

    border-radius:12px;

    text-decoration:none;

    font-size:14px;

    font-weight:600;

    white-space:nowrap;

    transition:.3s;

}


.admin-btn:hover{

    transform:translateY(-3px);

    box-shadow:0 8px 20px rgba(0,0,0,.25);

}
</style>
